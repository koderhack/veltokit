<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TrikiMotionKit</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090b12;
      --panel: #121725;
      --text: #eaf2ff;
      --muted: #97a6c0;
      --accent: #4cc9f0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #101a2e 0%, var(--bg) 55%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(980px, 100%);
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 28px;
      backdrop-filter: blur(6px);
    }
    h1 { margin: 0 0 10px; font-size: clamp(30px, 5vw, 52px); }
    p { margin: 0; color: var(--muted); line-height: 1.6; }
    .top { display: grid; gap: 14px; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      margin-top: 12px;
      text-decoration: none;
      background: var(--accent);
      color: #04121a;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 700;
    }
    video {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: #000;
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="top">
      <h1>TrikiMotionKit</h1>
      <p>Minimal motion-control SDK for mobile games with BLE connectivity and tilt-based input tuned for stable gameplay.</p>
      <div>
        <a class="btn" href="https://github.com/" target="_blank" rel="noreferrer">View on GitHub</a>
      </div>
    </section>

    <section>
      <video controls playsinline>
        <source src="demo.mp4" type="video/mp4">
      </video>
    </section>
  </main>
</body>
</html>
